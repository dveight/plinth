# ─────────────────────────────────────────────────────────────
# Plinth — MPV Configuration
# ─────────────────────────────────────────────────────────────

# ── Display ───────────────────────────────────────────────────
fs=yes                          # fullscreen
no-osc                          # no on-screen controller
no-osd-bar                      # no seek bar
cursor-autohide=always          # always hide cursor
no-input-default-bindings       # disable keyboard shortcuts
no-input-cursor                 # ignore cursor input


# ── Decode & GPU ─────────────────────────────────────────────────────
hwdec-codecs=all
cscale=bilinear
scale=bilinear
gpu-api=vulkan
hwdec=vaapi
deband=no
vo=gpu
video-sync=display-resample
interpolation=no

# ── Cache ─────────────────────────────────────────────────────
cache=yes
demuxer-max-bytes=512MiB
demuxer-max-back-bytes=128MiB
cache-secs=30

# ── Playback ──────────────────────────────────────────────────
loop-playlist=inf               # loop forever
no-audio                        # no audio output